<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Hub - All Models</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.2);
        }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }
        .pulse { animation: pulse 1.5s infinite; }
        .model-card:hover { transform: translateY(-4px); }
        .send-hover:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen p-4">
    
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="glass rounded-3xl p-8 text-center text-white">
            <h1 class="text-4xl font-bold mb-2 flex items-center justify-center gap-3 mx-auto">
                <i class="fas fa-robot text-5xl"></i> AI Chat Hub
            </h1>
            <p class="text-xl opacity-90">Chat with 12+ AI providers instantly</p>
            <div id="status" class="mt-4 text-lg font-semibold text-green-400">✅ Ready - Select a model</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- API KEYS -->
            <div class="lg:col-span-1 space-y-4">
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-white">
                        <i class="fas fa-key text-yellow-400"></i> API Keys
                    </h3>
                    <div id="keys-list" class="space-y-3 max-h-80 overflow-auto mb-4"></div>
                    <button onclick="addKey()" class="w-full bg-white/20 hover:bg-white/30 text-white py-3 px-4 rounded-xl font-semibold transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-plus"></i> Add API Key
                    </button>
                </div>

                <!-- MODELS -->
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-white">
                        <i class="fas fa-brain text-purple-400"></i> Select Model
                    </h3>
                    <div id="models-list" class="space-y-2 max-h-96 overflow-auto"></div>
                </div>
            </div>

            <!-- CHAT -->
            <div class="lg:col-span-3 space-y-4">
                <div id="chat-messages" class="glass rounded-3xl p-6 h-96 lg:h-[500px] overflow-y-auto space-y-4 scroll-smooth"></div>
                
                <div class="glass rounded-3xl p-6">
                    <div class="flex gap-3">
                        <input id="message-input" type="text" placeholder="Type your message... (Ctrl+Enter)" 
                            class="flex-1 bg-white/10 border border-white/20 rounded-2xl px-6 py-4 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/30">
                        <button id="send-btn" class="glass p-4 rounded-2xl hover:bg-white/30 transition-all send-hover text-white text-xl">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="text-center mt-3 text-xs text-white/50">
                        Model: <span id="active-model" class="font-semibold text-white">None selected</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATA STORAGE
        let apiKeys = JSON.parse(localStorage.getItem('ai_keys') || '{}');
        let messages = JSON.parse(localStorage.getItem('chat_history') || '[]');
        let currentModel = null;
        let isLoading = false;

        // ALL AI PROVIDERS ✅
        const providers = {
            'openrouter': { name: 'OpenRouter', base: 'https://openrouter.ai/api/v1/chat/completions', models: ['anthropic/claude-3.5-sonnet', 'meta-llama/llama-3.1-405b-instruct'] },
            'groq': { name: 'Groq', base: 'https://api.groq.com/openai/v1/chat/completions', models: ['llama3-70b-8192', 'mixtral-8x7b-32768'] },
            'together': { name: 'Together AI', base: 'https://api.together.xyz/v1/chat/completions', models: ['meta-llama/Llama-3.1-405B-Instruct'] },
            'deepseek': { name: 'DeepSeek', base: 'https://api.deepseek.com/v1/chat/completions', models: ['deepseek-chat'] },
            'fireworks': { name: 'Fireworks', base: 'https://api.fireworks.ai/inference/v1/chat/completions', models: ['accounts/fireworks/models/llama-v3p1-405b-instruct'] },
            'xai': { name: 'xAI Grok', base: 'https://api.x.ai/v1/chat/completions', models: ['grok-beta'] },
            'local': { name: 'Local Ollama', base: 'ws://localhost:11434/api/chat', models: ['llama3', 'phi3'] },
            'huggingface': { name: 'HuggingFace', base: 'https://api-inference.huggingface.co/models', models: ['microsoft/DialoGPT-large'] }
        };

        // INIT
        function init() {
            loadKeys();
            loadModels();
            loadChat();
            setupEvents();
        }

        function setupEvents() {
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('message-input').onkeypress = (e) => {
                if (e.ctrlKey && e.key === 'Enter') sendMessage();
            };
        }

        // API KEYS
        function addKey() {
            const provider = prompt('Provider (openrouter/groq/together/deepseek/fireworks/xai/local/huggingface):');
            if (!providers[provider]) return alert('Invalid provider!');
            
            const key = prompt('Enter API Key:');
            if (key) {
                apiKeys[provider] = key;
                localStorage.setItem('ai_keys', JSON.stringify(apiKeys));
                loadKeys();
                alert('✅ Key saved for ' + providers[provider].name);
            }
        }

        function loadKeys() {
            const list = document.getElementById('keys-list');
            list.innerHTML = Object.keys(apiKeys).length ? 
                Object.entries(apiKeys).map(([p,k]) => 
                    `<div class="flex justify-between items-center p-3 bg-white/10 rounded-xl">
                        <span>${providers[p]?.name || p}: ${k.slice(0,20)}...</span>
                        <button onclick="deleteKey('${p}')" class="text-red-400 hover:text-red-300">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>`
                ).join('') : 
                '<div class="text-white/50 text-center py-8">Add your first API key 👆</div>';
        }

        function deleteKey(provider) {
            delete apiKeys[provider];
            localStorage.setItem('ai_keys', JSON.stringify(apiKeys));
            loadKeys();
        }

        // MODELS
        function loadModels() {
            const list = document.getElementById('models-list');
            list.innerHTML = '';
            
            Object.entries(providers).forEach(([id, prov]) => {
                const hasKey = apiKeys[id];
                prov.models.forEach(model => {
                    const div = document.createElement('div');
                    div.className = `model-card p-4 rounded-xl cursor-pointer transition-all border-2 ${hasKey ? 'hover:bg-white/20 border-white/30 bg-white/10 hover:scale-105' : 'border-white/20 opacity-50 cursor-not-allowed'}`;
                    div.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="font-semibold text-white">${model.split('/').pop()}</div>
                                <div class="text-sm text-white/70">${prov.name}</div>
                            </div>
                            ${hasKey ? '✅' : '🔒'}
                        </div>`;
                    div.onclick = hasKey ? () => selectModel(id, model) : null;
                    list.appendChild(div);
                });
            });
        }

        function selectModel(provider, model) {
            currentModel = { provider, model };
            document.getElementById('active-model').textContent = `${providers[provider].name}: ${model.split('/').pop()}`;
            document.getElementById('status').textContent = `✅ Active: ${providers[provider].name}`;
            document.querySelectorAll('.model-card').forEach(el => el.classList.remove('ring-4', 'ring-blue-400'));
            event.target.closest('.model-card').classList.add('ring-4', 'ring-blue-400');
        }

        // CHAT
        async function sendMessage() {
            if (!currentModel || isLoading) return;
            
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            // Add user message
            addMessage('You', text, 'user');
            input.value = '';
            
            // AI Response
            isLoading = true;
            document.getElementById('status').textContent = '🤔 AI is thinking...';
            addMessage(providers[currentModel.provider].name, '⏳ Thinking...', 'ai', true);

            try {
                const response = await fetchAI(text);
                updateLastMessage(response);
            } catch (e) {
                updateLastMessage(`❌ Error: ${e.message}. Check your API key?`);
            }
            
            isLoading = false;
            document.getElementById('status').textContent = '✅ Ready';
            saveChat();
        }

        async function fetchAI(message) {
            const { provider, model } = currentModel;
            const key = apiKeys[provider];
            
            // OpenAI-compatible (most providers)
            if (['openrouter','groq','together','deepseek','fireworks','xai'].includes(provider)) {
                const res = await fetch(providers[provider].base, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model, messages: [{role: 'user', content: message}], temperature: 0.7, max_tokens: 1500
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            }
            
            // Local Ollama
            if (provider === 'local') {
                const ws = new WebSocket(providers[provider].base);
                return new Promise((resolve, reject) => {
                    ws.onopen = () => ws.send(JSON.stringify({model, messages: [{role: 'user', content: message}], stream: false}));
                    ws.onmessage = e => {
                        try {
                            const data = JSON.parse(e.data);
                            if (data.message?.content) resolve(data.message.content);
                        } catch {}
                    };
                    setTimeout(() => reject('Local server timeout'), 30000);
                });
            }
            
            throw new Error('Provider not supported yet');
        }

        function addMessage(sender, text, type = 'user', loading = false) {
            messages.push({ sender, text, type, time: new Date().toLocaleTimeString() });
            renderChat();
            document.getElementById('chat-messages').scrollTop = 999999;
        }

        function updateLastMessage(text) {
            messages[messages.length - 1].text = text;
            renderChat();
        }

        function renderChat() {
            const chat = document.getElementById('chat-messages');
            chat.innerHTML = messages.map(msg => `
                <div class="${msg.type === 'user' ? 'flex justify-end' : 'flex gap-3'}">
                    ${msg.type !== 'user' ? `<div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0 mt-1 text-white font-bold">${msg.sender[0]}</div>` : ''}
                    <div class="${msg.type === 'user' ? 'bg-white/20 rounded-2xl rounded-br-none' : 'bg-white/10 rounded-2xl rounded-tl-none'} p-4 max-w-[75%] backdrop-blur-sm">
                        <div class="font-semibold text-white text-sm mb-1">${msg.sender}</div>
                        <div class="text-white text-sm ${msg.type === 'ai' && msg.loading ? 'pulse' : ''}">${msg.text}</div>
                        <div class="text-xs text-white/50 mt-2">${msg.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function loadChat() {
            renderChat();
        }

        function saveChat() {
            localStorage.setItem('chat_history', JSON.stringify(messages.slice(-50))); // Keep last 50
        }

        // START
        init();
    </script>
</body>
</html>
